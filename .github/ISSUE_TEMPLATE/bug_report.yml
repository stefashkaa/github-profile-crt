name: Bug report
description: Report a bug in SVG generation, rendering, action runtime, or data collection
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include reproducible steps and non-secret config values.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Renderer / SVG output
        - Theme / colors / visual artifacts
        - GitHub Action runtime
        - CLI usage
        - Data fetching (user/org stats)
        - Docs
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The generated SVG has...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Set env ...
        2. Run `pnpm generate:dev`
        3. Open `assets/crt-dark.svg`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: themes
    attributes:
      label: Theme(s)
      description: Which theme(s) are affected?
      placeholder: crt, rainbow, winamp...

  - type: textarea
    id: env
    attributes:
      label: Relevant config (non-secret)
      description: Paste sanitized env/action inputs
      placeholder: |
        CRT_THEMES=crt
        CRT_SHOW_GRID=true
        CRT_YEAR=2025

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 14 / Ubuntu 24.04
        - Node: 22.x
        - pnpm: 10.x
        - Execution: local CLI / GitHub Actions

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant console/action logs
      render: shell

  - type: textarea
    id: attachments
    attributes:
      label: Screenshots or SVG snippet
      description: Add screenshots or relevant SVG fragment
