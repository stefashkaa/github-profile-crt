name: Feature request
description: Suggest a feature, new theme, dashboard improvement, or workflow enhancement
title: 'feat: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea. Include concrete use cases and expected output.

  - type: dropdown
    id: area
    attributes:
      label: Target area
      options:
        - Renderer / chart visuals
        - Theme system
        - Dashboard widgets
        - Data sources / stats
        - GitHub Action UX
        - Docs
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you facing?
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want to happen
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] New input is documented
        - [ ] Output SVG matches expected visuals
        - [ ] Works in both dark/light profile modes

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ideas or workarounds you tried

  - type: textarea
    id: references
    attributes:
      label: References
      description: Add screenshots, links, or examples
