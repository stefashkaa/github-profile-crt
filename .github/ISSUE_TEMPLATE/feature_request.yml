name: Feature request
description: Suggest a new feature, theme, or workflow enhancement
title: 'feat: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Thanks for sharing your idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you facing?
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want to happen
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ideas or workarounds you tried

  - type: input
    id: scope
    attributes:
      label: Scope
      description: Which area is impacted?
      placeholder: renderer, theme system, workflow, docs...

  - type: textarea
    id: references
    attributes:
      label: References
      description: Add screenshots, links, or examples
